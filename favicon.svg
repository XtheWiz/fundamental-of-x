<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- paper background with rounded corners -->
  <rect width="64" height="64" rx="8" fill="#f5f1e8"/>
  <!-- back hair shadow -->
  <path d="M 8 32 Q 4 6 32 3 Q 60 6 56 34 Q 52 20 32 16 Q 12 20 8 32 Z" fill="#1a1a1a"/>
  <!-- head -->
  <circle cx="32" cy="32" r="20" fill="#f5f1e8" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- front bangs -->
  <path d="M 10 28 Q 18 14 32 18 Q 46 14 54 28 Q 42 22 32 22 Q 22 22 10 28 Z" fill="#1a1a1a"/>
  <!-- eyes -->
  <circle cx="23" cy="34" r="2.6" fill="#1a1a1a"/>
  <circle cx="41" cy="34" r="2.6" fill="#1a1a1a"/>
  <!-- blush -->
  <ellipse cx="17" cy="40" rx="3" ry="1.4" fill="#d62828" opacity="0.4"/>
  <ellipse cx="47" cy="40" rx="3" ry="1.4" fill="#d62828" opacity="0.4"/>
  <!-- mouth -->
  <path d="M 27 43 Q 32 46 37 43" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- red scarf -->
  <rect x="4" y="51" width="56" height="12" fill="#d62828" stroke="#1a1a1a" stroke-width="2"/>
  <!-- X drawn as two strokes (more legible at tiny sizes than text) -->
  <line x1="28" y1="54.5" x2="36" y2="60.5" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="54.5" x2="28" y2="60.5" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
